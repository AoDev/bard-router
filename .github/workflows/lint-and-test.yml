name: Lint and Test

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Biome lint
        run: npm run lint

      - name: Run Jest
        run: npm run test-unit
